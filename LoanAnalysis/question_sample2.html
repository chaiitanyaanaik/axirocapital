<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "inverse-on-surface": "#f0f1f2",
                    "surface": "#f8f9fa",
                    "on-secondary-fixed": "#3d0026",
                    "primary-container": "#10b981",
                    "surface-tint": "#006c49",
                    "on-secondary-fixed-variant": "#85145a",
                    "surface-variant": "#e1e3e4",
                    "secondary-fixed-dim": "#ffafd3",
                    "surface-container-highest": "#e1e3e4",
                    "on-primary": "#ffffff",
                    "tertiary-fixed-dim": "#ffb2b9",
                    "surface-container": "#edeeef",
                    "on-error-container": "#93000a",
                    "surface-dim": "#d9dadb",
                    "secondary-fixed": "#ffd8e7",
                    "on-tertiary-fixed": "#400010",
                    "on-tertiary-container": "#750626",
                    "on-tertiary": "#ffffff",
                    "on-surface": "#191c1d",
                    "on-surface-variant": "#3c4a42",
                    "tertiary-fixed": "#ffdadc",
                    "tertiary": "#a93349",
                    "outline-variant": "#bbcabf",
                    "tertiary-container": "#ff778a",
                    "secondary": "#a43073",
                    "on-secondary-container": "#76014e",
                    "error-container": "#ffdad6",
                    "inverse-primary": "#4edea3",
                    "surface-container-low": "#f3f4f5",
                    "on-background": "#191c1d",
                    "on-primary-fixed": "#002113",
                    "inverse-surface": "#2e3132",
                    "secondary-container": "#fc79bd",
                    "primary": "#006c49",
                    "surface-bright": "#f8f9fa",
                    "on-primary-fixed-variant": "#005236",
                    "surface-container-high": "#e7e8e9",
                    "primary-fixed": "#6ffbbe",
                    "on-secondary": "#ffffff",
                    "primary-fixed-dim": "#4edea3",
                    "error": "#ba1a1a",
                    "outline": "#6c7a71",
                    "on-error": "#ffffff",
                    "surface-container-lowest": "#ffffff",
                    "on-primary-container": "#00422b",
                    "background": "#f8f9fa",
                    "on-tertiary-fixed-variant": "#891933"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "container-max": "1280px",
                    "unit": "8px",
                    "stack-sm": "12px",
                    "margin-page": "64px",
                    "gutter": "32px",
                    "stack-lg": "48px",
                    "stack-md": "24px"
            },
            "fontFamily": {
                    "headline-lg": ["Manrope"],
                    "body-md": ["Manrope"],
                    "body-lg": ["Manrope"],
                    "headline-md": ["Manrope"],
                    "display-xl": ["Manrope"],
                    "label-sm": ["Manrope"]
            },
            "fontSize": {
                    "headline-lg": ["40px", {"lineHeight": "1.2", "letterSpacing": "-0.03em", "fontWeight": "700"}],
                    "body-md": ["16px", {"lineHeight": "1.6", "letterSpacing": "0.01em", "fontWeight": "400"}],
                    "body-lg": ["18px", {"lineHeight": "1.6", "letterSpacing": "0.01em", "fontWeight": "400"}],
                    "headline-md": ["32px", {"lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                    "display-xl": ["64px", {"lineHeight": "1.1", "letterSpacing": "-0.04em", "fontWeight": "800"}],
                    "label-sm": ["14px", {"lineHeight": "1.4", "letterSpacing": "0.05em", "fontWeight": "600"}]
            }
          },
        },
      }
    </script>
<style>
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.03), 0 1px 2px rgba(16, 185, 129, 0.05);
        }
        .mesh-gradient {
            background-color: #f8f9fa;
            background-image: 
                radial-gradient(at 0% 0%, rgba(16, 185, 129, 0.05) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(164, 48, 115, 0.03) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(16, 185, 129, 0.08) 0px, transparent 50%),
                radial-gradient(at 0% 100%, rgba(164, 48, 115, 0.03) 0px, transparent 50%);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background font-body-md text-on-background min-h-screen mesh-gradient flex flex-col">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-white/80 dark:bg-slate-900/80 backdrop-blur-lg border-b border-white/20 dark:border-slate-800/50 shadow-[0_4px_30px_rgba(0,0,0,0.05)]">
<div class="flex items-center justify-between px-6 py-4 w-full">
<button class="active:scale-95 duration-200 ease-in-out hover:bg-emerald-50/50 transition-colors p-2 rounded-full">
<span class="material-symbols-outlined text-emerald-500" data-icon="arrow_back">arrow_back</span>
</button>
<div class="flex flex-col items-center">
<span class="font-manrope text-sm font-semibold tracking-tight text-slate-400">Step 2 of 5</span>
<div class="w-32 h-1 bg-surface-container mt-1 rounded-full overflow-hidden">
<div class="w-2/5 h-full bg-primary-container"></div>
</div>
</div>
<button class="active:scale-95 duration-200 ease-in-out hover:bg-emerald-50/50 transition-colors p-2 rounded-full">
<span class="material-symbols-outlined text-slate-400" data-icon="close">close</span>
</button>
</div>
</header>
<!-- Main Content -->
<main class="flex-grow flex flex-col items-center justify-start pt-32 px-6 pb-32 max-w-lg mx-auto w-full">
<!-- Headline Section -->
<div class="w-full mb-stack-lg">
<h1 class="font-headline-md text-headline-md text-on-surface mb-stack-sm">
                How long ago did you secure this loan?
            </h1>
<p class="font-body-md text-on-surface-variant flex items-center gap-2">
<span class="material-symbols-outlined text-primary-container text-lg" data-icon="info">info</span>
                Market rates change frequently.
            </p>
</div>
<!-- Single Column Option Cards -->
<div class="w-full space-y-4">
<!-- Option 1 (Selected State Example) -->
<button class="w-full glass-card rounded-xl p-stack-md flex items-center justify-between transition-all border-2 border-primary-container ring-4 ring-primary-container/5 active:scale-[0.98]">
<div class="flex items-center gap-4">
<div class="w-12 h-12 rounded-full bg-primary-container/10 flex items-center justify-center">
<span class="material-symbols-outlined text-primary-container" data-icon="calendar_today">calendar_today</span>
</div>
<span class="font-body-lg text-on-surface font-semibold">Within the last 12 months</span>
</div>
<div class="w-6 h-6 rounded-full bg-primary-container flex items-center justify-center">
<span class="material-symbols-outlined text-white text-sm" data-icon="check" data-weight="fill" style="font-variation-settings: 'FILL' 1;">check</span>
</div>
</button>
<!-- Option 2 -->
<button class="w-full glass-card rounded-xl p-stack-md flex items-center justify-between transition-all hover:bg-white/90 active:scale-[0.98]">
<div class="flex items-center gap-4">
<div class="w-12 h-12 rounded-full bg-slate-100 flex items-center justify-center">
<span class="material-symbols-outlined text-slate-500" data-icon="date_range">date_range</span>
</div>
<span class="font-body-lg text-on-surface font-semibold">1-3 years ago</span>
</div>
<div class="w-6 h-6 rounded-full border-2 border-outline-variant"></div>
</button>
<!-- Option 3 -->
<button class="w-full glass-card rounded-xl p-stack-md flex items-center justify-between transition-all hover:bg-white/90 active:scale-[0.98]">
<div class="flex items-center gap-4">
<div class="w-12 h-12 rounded-full bg-slate-100 flex items-center justify-center">
<span class="material-symbols-outlined text-slate-500" data-icon="history">history</span>
</div>
<span class="font-body-lg text-on-surface font-semibold">Over 3 years ago</span>
</div>
<div class="w-6 h-6 rounded-full border-2 border-outline-variant"></div>
</button>
<!-- Option 4 -->
<button class="w-full glass-card rounded-xl p-stack-md flex items-center justify-between transition-all hover:bg-white/90 active:scale-[0.98]">
<div class="flex items-center gap-4">
<div class="w-12 h-12 rounded-full bg-slate-100 flex items-center justify-center">
<span class="material-symbols-outlined text-slate-500" data-icon="help_outline">help_outline</span>
</div>
<span class="font-body-lg text-on-surface font-semibold">Not sure</span>
</div>
<div class="w-6 h-6 rounded-full border-2 border-outline-variant"></div>
</button>
</div>
</main>
<!-- Bottom CTA Fixed -->
<footer class="fixed bottom-0 w-full p-6 bg-white/60 backdrop-blur-xl border-t border-white/20">
<div class="max-w-lg mx-auto w-full">
<button class="w-full py-4 bg-primary-container text-white font-label-sm text-lg rounded-xl shadow-lg shadow-primary-container/20 hover:opacity-90 active:scale-95 transition-all">
                Continue
            </button>
</div>
</footer>
<!-- Decorative Mesh Elements -->
<div class="fixed top-20 right-[-10%] w-[300px] h-[300px] bg-primary-container/10 blur-[100px] rounded-full -z-10"></div>
<div class="fixed bottom-20 left-[-10%] w-[300px] h-[300px] bg-secondary-container/10 blur-[100px] rounded-full -z-10"></div>
</body></html>
